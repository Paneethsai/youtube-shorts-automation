name: Daily YouTube Video Automation

on:
  schedule:
    - cron: '30 3 * * *'   # 9:00 AM IST is 3:30 AM UTC
    - cron: '30 9 * * *'   # 3:00 PM IST is 9:30 AM UTC
  workflow_dispatch:      # Allows manual trigger via GitHub web UI

permissions:
  contents: write         # Allows committing used_topics.txt back to the repo

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          pip install -r requirements.txt

      - name: Setup Credentials & Keys
        env:
          CLIENT_SECRETS_CONTENT: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
          CREDENTIALS_BASE64: ${{ secrets.YOUTUBE_CREDENTIALS_BASE64 }}
          ENV_CONTENT: ${{ secrets.ENV_FILE }}
        run: |
          # Recreate client_secrets.json
          echo "$CLIENT_SECRETS_CONTENT" > client_secrets.json
          # Recreate youtube_credentials.json by decoding from base64
          echo "$CREDENTIALS_BASE64" | base64 --decode > youtube_credentials.json
          # Recreate .env file
          echo "$ENV_CONTENT" > .env

      - name: Set up Piper TTS
        run: |
          mkdir -p assets/piper
          # Download Piper Linux binary
          wget -O assets/piper.tar.gz https://github.com/rhasspy/piper/releases/download/v1.2.0/piper_amd64.tar.gz
          tar -C assets/piper -xvf assets/piper.tar.gz --strip-components 1
          rm assets/piper.tar.gz
          # Download voice model
          wget -O assets/en_US-lessac-medium.onnx https://huggingface.co/rhasspy/piper-voices/resolve/main/en/en_US/lessac/medium/en_US-lessac-medium.onnx
          wget -O assets/en_US-lessac-medium.onnx.json https://huggingface.co/rhasspy/piper-voices/resolve/main/en/en_US/lessac/medium/en_US-lessac-medium.onnx.json
          # Update .env to use the Linux Piper executable
          python -c "import os; text=open('.env').read().replace('assets/piper/piper.exe', 'assets/piper/piper'); open('.env', 'w').write(text)"

      - name: Determine Format & Run Pipeline
        run: |
          # Determine format based on UTC trigger hour
          TRIGGER_HOUR=$(date -u +%H)
          if [ "$TRIGGER_HOUR" -lt 6 ]; then
            echo "Running Shorts Job (scheduled for 9:00 AM IST / 3:30 AM UTC)..."
            python main.py --format short --privacy public
          else
            echo "Running Long-form Job (scheduled for 3:00 PM IST / 9:30 AM UTC)..."
            python main.py --format long --privacy public
          fi

      - name: Commit Used Topics History
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -f used_topics.txt
          git commit -m "Update used topics history [skip ci]" || echo "No changes to commit"
          git push origin main
